<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BridgeMaster 40</title>

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --error: #f85149;
            --success: #3fb950;
            --text: #c9d1d9;
            --border: #30363d;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* アプリ風ヘッダー */
        header {
            padding: calc(var(--safe-top) + 10px) 20px 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.1rem; margin: 0; color: var(--accent); font-weight: 800; }
        .pdf-badge { font-size: 10px; background: #30363d; padding: 2px 8px; border-radius: 10px; }

        /* ナビゲーションタブ */
        .tabs {
            display: flex;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #8b949e;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        /* コンテンツ表示エリア */
        .main-view {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view {
            display: none;
            height: 100%;
            padding: 15px;
            flex-direction: column;
        }

        .view.active { display: flex; }

        /* アップロードセクション */
        .upload-area {
            background: var(--panel);
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .upload-area:active { transform: scale(0.98); background: #1c2128; }

        /* 黒いコンソール */
        .console {
            flex: 1;
            background: #000;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            line-height: 1.6;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .log { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .log-ok { border-color: var(--success); color: var(--success); }

        /* エンジニアリスト (40モジュール) */
        .engineer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        .engineer-card {
            background: var(--panel);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; }
        .online { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* 下部固定アクション */
        footer {
            padding: 15px 20px calc(var(--safe-bottom) + 15px);
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-prime { background: var(--accent); color: #fff; }
        .btn-ghost { background: #30363d; color: #fff; }
        .btn:active { opacity: 0.7; }

    </style>
</head>
<body>

<header>
    <h1>BridgeMaster 40</h1>
    <div class="pdf-badge" id="pdf-count">Wiki PDFs: 0/2</div>
</header>

<div class="tabs">
    <div id="t-console" class="tab active" onclick="switchTab('console')">CONSOLE</div>
    <div id="t-engine" class="tab" onclick="switchTab('engine')">ENGINEERS</div>
</div>

<div class="main-view">
    <div id="v-console" class="view active">
        <div class="upload-area" onclick="document.getElementById('fileIn').click()">
            <div style="font-size:30px">📎</div>
            <strong>Tap to Load Data</strong><br>
            <span style="font-size:11px; color:#8b949e">JAR & Wiki PDFs (Android/iOS Compatible)</span>
            <input type="file" id="fileIn" multiple style="display:none">
        </div>
        <div class="console" id="logBox">
            <div class="log">SYSTEM: Engine initialized. Awaiting assets...</div>
        </div>
    </div>

    <div id="v-engine" class="view">
        <div class="engineer-grid" id="engGrid"></div>
    </div>
</div>

<footer>
    <button class="btn btn-prime" onclick="runEngine()">START TRANSPILE</button>
    <button class="btn btn-ghost" onclick="clearLog()">RESET</button>
</footer>

<script>
    const engineers = [
        "Main_Controller", "PDF_Java_Parser", "PDF_Bedrock_Parser", "Knowledge_Bridge",
        "Dictionary_Java", "Dictionary_Bedrock", "Search_Dispatcher", "Error_Judge",
        "Pre_Error_Observer", "Logic_Validator", "Geometry_Matrix", "Bone_Hierarchy",
        "UV_Mapper", "Texture_Processor", "Particle_Factory", "Sound_Event_Mixer",
        "Audio_Metadata", "AI_Goal_Parser", "Animation_State_Machine", "MoLang_Translator",
        "Variable_Tracker", "Recipe_Synthesizer", "UI_Architecture", "Pack_Generator",
        "Custom_Logic", "UUID_Coord", "Translation_Synth", "Memory_Optimizer",
        "Version_Bridge", "Shader_Logic", "NBT_Translator", "Sound_Attenuation",
        "Network_Packet", "QA_Auto_Tester", "UI_State_Bridge", "Block_Network",
        "World_Gen", "Physics_Calc", "Asset_De-Duplicator", "Final_Archive"
    ];

    // Build Engineer Cards
    const grid = document.getElementById('engGrid');
    engineers.forEach(name => {
        const card = document.createElement('div');
        card.className = 'engineer-card';
        card.innerHTML = `<span>${name}.js</span><div class="status-dot" id="dot-${name}"></div>`;
        grid.appendChild(card);
    });

    function switchTab(target) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('v-' + target).classList.add('active');
        document.getElementById('t-' + target).classList.add('active');
    }

    function addLog(text, isOk = false) {
        const box = document.getElementById('logBox');
        const div = document.createElement('div');
        div.className = isOk ? 'log log-ok' : 'log';
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function runEngine() {
        addLog(">>> Deployment initiated...", true);
        engineers.forEach((name, i) => {
            setTimeout(() => {
                document.getElementById('dot-' + name).classList.add('online');
                if (i % 5 === 0) addLog(`Module [${name}] is now ACTIVE.`);
            }, i * 30);
        });
    }

    function clearLog() {
        document.getElementById('logBox').innerHTML = '<div class="log">Console cleared.</div>';
    }

    // Android "Back" Button Hack
    history.pushState(null, null, location.href);
    window.onpopstate = () => {
        switchTab('console');
        history.go(1);
    };

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            addLog("PWA: Service Worker Active", true);
        });
    }
</script>
</body>
</html>
