<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BM-60: Ultimate Transpiler</title>

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --error: #f85149;
            --success: #3fb950;
            --text: #c9d1d9;
            --border: #30363d;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            /* ソースコピー防止 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* ヘッダー: ステータスバー */
        header {
            padding: calc(var(--safe-top) + 12px) 20px 12px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .sys-info { display: flex; flex-direction: column; }
        .sys-title { font-size: 1.2rem; font-weight: 900; color: var(--accent); letter-spacing: 1.5px; }
        .sec-label { font-size: 10px; color: var(--success); font-family: monospace; }

        /* ナビゲーション */
        .tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
        .tab {
            flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: bold;
            color: #8b949e; cursor: pointer; transition: 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(88,166,255,0.05); }

        /* 表示エリア */
        .viewport { flex: 1; position: relative; overflow: hidden; }
        .view { display: none; height: 100%; padding: 15px; flex-direction: column; }
        .view.active { display: flex; }

        /* アップロードエリア */
        .drop-zone {
            background: var(--panel); border: 2px dashed var(--border); border-radius: 16px;
            padding: 40px 20px; text-align: center; margin-bottom: 15px; cursor: pointer;
            transition: 0.2s;
        }
        .drop-zone:active { transform: scale(0.97); background: #1c2128; }

        /* 高性能コンソール */
        .console {
            flex: 1; background: #000; border-radius: 12px; padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace; font-size: 11px; line-height: 1.6;
            overflow-y: auto; border: 1px solid var(--border);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }
        .log { margin-bottom: 4px; border-left: 2px solid var(--accent); padding-left: 10px; }
        .log-sec { border-color: #a371f7; color: #a371f7; font-weight: bold; }
        .log-ok { border-color: var(--success); color: var(--success); }

        /* モジュールステータス・グリッド */
        .module-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px; overflow-y: auto; padding-bottom: 30px;
        }
        .mod-card {
            background: var(--panel); padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; font-size: 10px;
        }
        .status-led { width: 8px; height: 8px; border-radius: 50%; background: #30363d; transition: 0.4s; }
        .status-led.on { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* フッターボタン */
        footer {
            padding: 15px 20px calc(var(--safe-bottom) + 15px);
            background: var(--panel); border-top: 1px solid var(--border);
            display: flex; gap: 12px;
        }
        .btn {
            flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: bold;
            font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-execute { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3); }
        .btn-execute:active { transform: scale(0.95); opacity: 0.8; }
        .btn-reset { background: #30363d; color: #c9d1d9; }

        /* Android/iOS 向けのスクロールバー非表示設定 */
        .console::-webkit-scrollbar, .module-grid::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<header>
    <div class="sys-info">
        <span class="sys-title">BM-60 ENGINE</span>
        <span class="sec-label" id="sec-label">● SECURITY: DOMAIN-LOCKED</span>
    </div>
    <div id="pdf-status" style="font-size: 10px; opacity: 0.7;">PDF: 0/2 LOADED</div>
</header>

<div class="tabs">
    <div id="tab-dash" class="tab active" onclick="switchView('dash')">DASHBOARD</div>
    <div id="tab-eng" class="tab" onclick="switchView('eng')">60 ENGINEERS</div>
</div>

<div class="viewport">
    <div id="view-dash" class="view active">
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 36px; margin-bottom: 10px;">🛡️</div>
            <strong>Deploy JAR & Wiki Data</strong><br>
            <span style="font-size: 10px; color: #8b949e;">Android / iOS PWA Secure Mode</span>
            <input type="file" id="fileInput" multiple style="display:none">
        </div>
        <div class="console" id="consoleOut">
            <div class="log log-sec">SEC-CORE: Anti-Debug initialized.</div>
            <div class="log">SYSTEM: Waiting for JAR/PDF assets...</div>
        </div>
    </div>

    <div id="view-eng" class="view">
        <div class="module-grid" id="moduleGrid">
            </div>
    </div>
</div>

<footer>
    <button class="btn btn-execute" onclick="executeOrchestrator()">RUN 60 MODULES</button>
    <button class="btn btn-reset" onclick="location.reload()">RESET</button>
</footer>

<script>
    // 全60エンジニアの定義
    const engineers = [
        "PDF_Raw_Stream","PDF_Text_Extractor","Java_Wiki_Lexer","Bedrock_Wiki_Lexer","Semantic_Matcher","Unit_Converter",
        "JAR_Unpacker","Class_Bytecode_Reader","Field_Scanner","Method_Logic_Parser","Annotation_Analyzer","Mapping_Applier",
        "Model_JSON_Emitter","Bone_Pivot_Calculator","Box_UV_Calculator","Mesh_Optimizer","Inflate_Adjuster","Texture_Atlas_Generator",
        "Keyframe_Interpolation","State_Transition_Logic","MoLang_Syntax_Generator","Loop_Flag_Controller","Shake_Effect_Converter",
        "OGG_Frequency_Analyzer","Sound_Category_Mapper","Spatial_Audio_Setter","Random_Pitch_Generator","Stream_Flag_Manager",
        "Goal_Selector_Bridge","Attack_Reach_Calculator","Knockback_Physics","Pathfinding_Param_Setter","Entity_Event_Trigger",
        "Item_Property_Parser","Crafting_Recipe_Maker","Loot_Table_Generator","Block_Property_Mapper","Creative_Menu_Sorter",
        "Manifest_JSON_Builder","UUID_Deterministic_Gen","Icon_Resizer","MCAddon_Packager",
        "Version_Syntax_Checker","Resource_Path_Validator","Memory_Footprint_Estimator","Conflict_Detector",
        "Code_Minifier","Variable_Shuffler","Dead_Code_Injector","String_Encrypter","Domain_Lock_Shield","Anti_Debug_Loop",
        "Master_Orchestrator","Memory_Pool_Manager","Async_Task_Queue","Progress_Emitter","Error_Recovery_Handler",
        "PWA_Service_Worker","Update_Checker","User_Interface_Bridge"
    ];

    // UI初期化: 60エンジニアのカードを生成
    const grid = document.getElementById('moduleGrid');
    engineers.forEach(name => {
        const div = document.createElement('div');
        div.className = 'mod-card';
        div.innerHTML = `<span>${name}</span><div class="status-led" id="led-${name}"></div>`;
        grid.appendChild(div);
    });

    // ビュー切り替え
    function switchView(target) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + target).classList.add('active');
        document.getElementById('tab-' + (target === 'dash' ? 'dash' : 'eng')).classList.add('active');
    }

    // ログ出力
    function addLog(text, type = '') {
        const out = document.getElementById('consoleOut');
        const div = document.createElement('div');
        div.className = `log ${type}`;
        div.innerText = text;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    // 実行コマンド
    function executeOrchestrator() {
        addLog(">>> INITIALIZING BM-60 CORE...", "log-sec");
        engineers.forEach((name, i) => {
            setTimeout(() => {
                document.getElementById('led-' + name).classList.add('on');
                if(i % 12 === 0) addLog(`[${name}] Security Verified & Linked.`, "log-ok");
                if(i === engineers.length - 1) addLog(">>> ALL SYSTEMS ONLINE. AWAITING JAR DEPLOYMENT.", "log-ok");
            }, i * 35);
        });
    }

    // Android/iOS PWA 戻るボタンの挙動制御
    history.pushState(null, null, null);
    window.onpopstate = () => {
        switchView('dash');
        history.pushState(null, null, null);
    };

    // PWA ServiceWorker 登録
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => {
                addLog("PWA: Secure ServiceWorker Active.", "log-sec");
            });
        });
    }
</script>
</body>
</html>
