<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Java2Bedrock.ai</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#58a6ff">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #58a6ff;
            --error: #f85149;
            --success: #3fb950;
            --text: #c9d1d9;
            --border: #30363d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ヘッダー */
        header {
            padding: env(safe-area-inset-top) 20px 10px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 { font-size: 1.2rem; margin: 0; color: var(--accent); letter-spacing: 1px; }

        /* タブナビゲーション */
        .tabs {
            display: flex;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: #8b949e;
            transition: 0.2s;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        /* メイン表示エリア */
        .viewport {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .view {
            display: none;
            height: 100%;
            padding: 15px;
            flex-direction: column;
        }

        .view.active { display: flex; }

        /* アップロードカード */
        .drop-card {
            background: var(--panel);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .drop-card:active { background: rgba(255,255,255,0.05); }

        /* コンソールログ */
        .console {
            flex: 1;
            background: #000;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .log { margin-bottom: 4px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .log-success { border-color: var(--success); color: var(--success); }
        .log-error { border-color: var(--error); color: var(--error); }

        /* モジュールグリッド */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }

        .module-item {
            background: var(--panel);
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #484f58;
            box-shadow: 0 0 2px #000;
        }

        .status-online { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* フッターアクション */
        footer {
            padding: 15px env(safe-area-inset-right) calc(15px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-run { background: var(--accent); color: #fff; }
        .btn-run:active { opacity: 0.8; transform: scale(0.98); }
        .btn-clear { background: #30363d; color: #c9d1d9; }

        /* PC向け調整 */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(4, 1fr); }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>BridgeMaster 40</h1>
    <div id="pdf-status" style="font-size: 11px; color: #8b949e;">PDF: 0/2 Ready</div>
</header>

<div class="tabs">
    <div id="tab-console" class="tab active" onclick="showView('console')">CONSOLE</div>
    <div id="tab-modules" class="tab" onclick="showView('modules')">40 ENGINEERS</div>
</div>

<div class="viewport">
    <div id="view-console" class="view active">
        <div class="drop-card" onclick="document.getElementById('filePicker').click()">
            <div style="font-size: 24px; margin-bottom: 10px;">📦</div>
            <strong>JAR / PDF データを投入</strong><br>
            <span style="font-size:11px; color:#8b949e;">タップしてファイルを選択してください</span>
            <input type="file" id="filePicker" multiple style="display:none">
        </div>
        <div class="console" id="logOut">
            <div class="log">SYSTEM: Waiting for input...</div>
        </div>
    </div>

    <div id="view-modules" class="view">
        <div class="module-grid" id="moduleContainer">
            </div>
    </div>
</div>

<footer>
    <button class="btn btn-run" onclick="executeSystem()">Run Bridge Engine</button>
    <button class="btn btn-clear" onclick="clearLogs()">Clear</button>
</footer>

<script>
    // 40の専門家リスト
    const engineers = [
        "Main_Controller", "PDF_Java_Parser", "PDF_Bedrock_Parser", "Knowledge_Bridge",
        "Dictionary_Java", "Dictionary_Bedrock", "Search_Dispatcher", "Error_Judge",
        "Pre_Error_Observer", "Logic_Validator", "Geometry_Matrix", "Bone_Hierarchy",
        "UV_Mapper", "Texture_Processor", "Particle_Factory", "Sound_Event_Mixer",
        "Audio_Metadata", "AI_Goal_Parser", "Animation_State_Machine", "MoLang_Translator",
        "Variable_Tracker", "Recipe_Synthesizer", "UI_Architecture", "Pack_Generator",
        "Custom_Logic", "UUID_Coord", "Translation_Synth", "Memory_Optimizer",
        "Version_Bridge", "Shader_Logic", "NBT_Translator", "Sound_Attenuation",
        "Network_Packet", "QA_Auto_Tester", "UI_State_Bridge", "Block_Network",
        "World_Gen", "Physics_Calc", "Asset_De-Duplicator", "Final_Archive"
    ];

    // UI初期化
    const container = document.getElementById('moduleContainer');
    engineers.forEach(name => {
        const item = document.createElement('div');
        item.className = 'module-item';
        item.innerHTML = `<span>${name}.js</span><div class="status-dot" id="dot-${name}"></div>`;
        container.appendChild(item);
    });

    // タブ切り替え
    function showView(target) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + target).classList.add('active');
        document.getElementById('tab-' + target).classList.add('active');
    }

    // ログ表示
    function addLog(msg, type = '') {
        const logBox = document.getElementById('logOut');
        const div = document.createElement('div');
        div.className = `log ${type}`;
        div.innerText = msg;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() {
        document.getElementById('logOut').innerHTML = '<div class="log">Console cleared.</div>';
    }

    // PWAサービスワーカーの登録（アプリ化に必要）
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                addLog('SYSTEM: ServiceWorker Online (PWA Mode)');
            }).catch(err => console.log('SW registration failed:', err));
        });
    }

    // 実行デモ
    function executeSystem() {
        addLog('>>> Initializing BridgeMaster 40 Engine...', 'log-success');
        // 各エンジニアをオンラインにする演出
        engineers.forEach((name, i) => {
            setTimeout(() => {
                document.getElementById('dot-' + name).classList.add('status-online');
                if(i === engineers.length - 1) addLog('>>> All Engineers are ONLINE.', 'log-success');
            }, i * 50);
        });
    }
</script>

</body>
</html>
